# Anchor researchers — the roots from which we discover 徒子徒孙 (mentees and grand-mentees).
#
# These are NOT necessarily the cover targets themselves. They're senior figures used
# to:
#   1. Build the lineage graph (advisor edges flow from these nodes downward)
#   2. Bias topic classification (papers co-authored by anchors get topic priors)
#   3. Seed the institutional prestige map
#
# Do NOT add emails, phones, or any PII here. Public homepages, Twitter handles, GitHub
# handles are fine. The scraper fills in contact info into the DB (never into this YAML).
#
# Fields:
#   slug              required, kebab-case, stable
#   name_en           required
#   name_zh           optional, Chinese name
#   current_affiliation  must match an entry in institutions.yaml
#   current_role      phd / postdoc / incoming_ap / ap / associate / full / senior / industry
#   bio               1-2 line English summary
#   confidence_level  low / medium / high — for the affiliation+role at time of writing

