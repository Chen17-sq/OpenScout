name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: uv sync
        run: uv sync --all-extras

      - name: ruff format check
        run: uv run ruff format --check src/ tests/

      - name: ruff lint
        run: uv run ruff check src/ tests/

      - name: pytest
        run: uv run pytest -q

  web-check:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: svelte-kit sync (generates .svelte-kit/tsconfig.json)
        run: npx svelte-kit sync
      - run: npm run check
