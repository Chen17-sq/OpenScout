name: deploy

# Only fires on tagged releases. For continuous-deploy on push, remove the
# `tags:` filter and add `branches: [main]`. We keep it tag-gated because
# Fly deploys require FLY_API_TOKEN secret (not set in fresh forks).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  fly:
    name: Deploy backend to Fly.io
    runs-on: ubuntu-latest
    if: ${{ vars.FLY_DEPLOY_ENABLED == 'true' }}
    concurrency:
      group: fly-deploy
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v5
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
